{% extends "base.html" %}

{% block content %}
<div class="dashboard-layout">
    <!-- Sidebar -->
    {{ sidebar('leader', 'dashboard') }}

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        {{ header(user, 'Club Leader') }}

        <!-- Content Area -->
        <div class="content-wrapper">
            <div class="page-title">
                <h1>Create New Event</h1>
                <p>Schedule a new club activity for members to join.</p>
            </div>

            <!-- Form Section -->
            <div class="content-section" style="max-width: 600px;">
                <form action="{{ url_for('create_event') }}" method="POST">
                    <div class="form-group">
                        <label for="title">Event Title</label>
                        <input type="text" id="title" name="title" required placeholder="e.g. DSA Study Session">
                    </div>

                    <div class="form-group">
                        <label for="date">Event Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Event Description</label>
                        <textarea id="description" name="description" rows="4" required
                            placeholder="What is this event about?"
                            style="width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; font-size: 14px; resize: vertical;"></textarea>
                    </div>

                    <div style="margin-top: 30px; display: flex; gap: 15px;">
                        <button type="submit" class="btn"><i class="fas fa-calendar-plus"
                                style="margin-right: 8px;"></i>Host Event</button>
                        <a href="{{ url_for('leader_dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}
